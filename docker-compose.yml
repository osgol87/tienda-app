services:
  eureka-server:
    build: ./DiscoveryService
    container_name: eureka-server-container
    ports:
      - "8761:8761"
    environment:
      # Deshabilita el registro de sí mismo en un entorno de servidor único
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: 'false'
      EUREKA_CLIENT_FETCH_REGISTRY: 'false'
    networks:
      - microservice-net

  gateway-service:
    build: ./GatewayService
    container_name: gateway-service-container
    ports:
      - "8762:8762"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: tienda-app-jwt-secret-key-change-this-in-production-please
    networks:
      - microservice-net
    depends_on:
      - eureka-server
  
  orders-db:
    image: docker.io/postgres:17-alpine3.22 # O la versión que prefieras
    container_name: orders-db-container
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: orders_db # Es buena práctica ser explícito
    volumes:
      - orders-data:/var/lib/postgresql/data
    networks:
      - microservice-net
  
  users-db:
    image: docker.io/postgres:17-alpine3.22 # O la versión que prefieras
    container_name: users-db-container
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: users_db # Es buena práctica ser explícito
    volumes:
      - users-data:/var/lib/postgresql/data
    networks:
      - microservice-net

  product-service:
    build: ./ProductServiceElastic
    container_name: product-service-container
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      ELASTICSEARCH_HOST: vibrant-sassafras-1qpqwpy9.us-east-1.bonsaisearch.net:443
      ELASTICSEARCH_USER: e8a1040b53
      ELASTICSEARCH_PASS: acb720dba11a489a781b
      JWT_SECRET: tienda-app-jwt-secret-key-change-this-in-production-please
    networks:
      - microservice-net
    depends_on:
      - eureka-server

  user-service:
    build: ./UserService
    container_name: user-service-container
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      USERSERVICE_DB_URL: jdbc:postgresql://users-db:5432/users_db
      USERSERVICE_DB_USER: postgres
      USERSERVICE_DB_PASS: postgresql
      USERSERVICE_DDL_AUTO: update
      JWT_SECRET: tienda-app-jwt-secret-key-change-this-in-production-please
    networks:
      - microservice-net
    depends_on:
      - eureka-server
      - users-db

  order-service:
    build: ./OrderService
    container_name: order-service-container
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      ORDERSERVICE_DB_URL: jdbc:postgresql://orders-db:5432/orders_db
      ORDERSERVICE_DB_USER: postgres
      ORDERSERVICE_DB_PASS: postgresql
      ORDERSERVICE_DDL_AUTO: update
      JWT_SECRET: tienda-app-jwt-secret-key-change-this-in-production-please
    networks:
      - microservice-net
    depends_on:
      - eureka-server
      - orders-db

networks:
  microservice-net:
    driver: bridge

volumes:
  users-data:
    driver: local
  orders-data:
    driver: local
