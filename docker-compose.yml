  product-service:
    build: ./ProductServiceElastic
    container_name: product-service-container
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      ELASTICSEARCH_HOST: vibrant-sassafras-1qpqwpy9.us-east-1.bonsaisearch.net:443
      ELASTICSEARCH_USER: e8a1040b53
      ELASTICSEARCH_PASS: acb720dba11a489a781b
    networks:
      - microservice-net
    depends_on:
      - eureka-server

  user-service:
    build: ./UserService
    container_name: user-service-container
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      USERSERVICE_DB_URL: jdbc:postgresql://postgres-db:5432/postgres
      USERSERVICE_DB_USER: postgres
      USERSERVICE_DB_PASS: postgresql
      USERSERVICE_DDL_AUTO: create
      JWT_SECRET: tienda-app-jwt-secret-key-change-this-in-production-please
    networks:
      - microservice-net
    depends_on:
      - eureka-server
      - postgres-db

  order-service:
    build: ./OrderService
    container_name: order-service-container
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      ORDERSERVICE_DB_URL: jdbc:postgresql://postgres-db:5432/postgres
      ORDERSERVICE_DB_USER: postgres
      ORDERSERVICE_DB_PASS: postgresql
      ORDERSERVICE_DDL_AUTO: create
    networks:
      - microservice-net
    depends_on:
      - eureka-server
      - postgres-db

networks:
  microservice-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
