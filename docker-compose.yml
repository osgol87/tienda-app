services:
  eureka-server:
    build: ./DiscoveryService
    container_name: eureka-server-container
    ports:
      - "8761:8761"
    environment:
      # Deshabilita el registro de sí mismo en un entorno de servidor único
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: 'false'
      EUREKA_CLIENT_FETCH_REGISTRY: 'false'
    networks:
      - microservice-net

  gateway-service:
    build: ./GatewayService
    container_name: gateway-service-container
    ports:
      - "8762:8762"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: tienda-app-jwt-secret-key-change-this-in-production-please
    networks:
      - microservice-net
    depends_on:
      - eureka-server
  
  postgres-db:
    image: docker.io/postgres:17-alpine3.22 # O la versión que prefieras
    container_name: postgres-container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: postgres # Es buena práctica ser explícito
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - microservice-net

